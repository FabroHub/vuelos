<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frankfurt-Hahn (HHN)</title>
  <style>
    :root {
      --bg-dark: #0f172a;
      --panel-bg: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-color: #f59e0b;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      background-color: var(--bg-dark);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      background-color: var(--panel-bg);
      padding: 20px;
      border-radius: 4px;
      margin-bottom: 20px;
      border-left: 5px solid var(--accent-color);
    }

    header h1 { margin: 0; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px; }
    header p { margin: 5px 0 0 0; font-size: 0.85rem; color: var(--text-muted); }

    /* --- NUEVOS ESTILOS PARA LOS BOTONES DE PESTAÑA --- */
    .selector-modo {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .btn-tab {
      background-color: var(--panel-bg);
      color: var(--text-muted);
      border: 1px solid #334155;
      padding: 12px 24px;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.2s ease;
    }

    .btn-tab:hover {
      background-color: #334155;
      color: #ffffff;
    }

    .btn-tab.activo {
      background-color: var(--accent-color);
      color: #0f172a;
      border-color: var(--accent-color);
    }

    .filtro-contenedor {
      margin-bottom: 20px;
      background-color: var(--panel-bg);
      padding: 15px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .filtro-contenedor label {
      color: var(--text-muted);
      font-size: 0.9rem;
      text-transform: uppercase;
    }

    .filtro-contenedor select {
      background-color: #0f172a;
      color: var(--accent-color);
      border: 1px solid #334155;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 0.9rem;
      border-radius: 4px;
      cursor: pointer;
      outline: none;
    }

    .seccion-dia {
      margin-bottom: 35px;
    }

    .titulo-dia {
      background-color: #0f172a;
      color: #ffffff;
      padding: 10px 15px;
      font-size: 1.1rem;
      border-left: 4px solid #38bdf8;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .tabla-vuelos {
      width: 100%;
      border-collapse: collapse;
      background-color: var(--panel-bg);
      margin-bottom: 10px;
    }

    .tabla-vuelos th {
      background-color: #1e293b;
      color: var(--accent-color);
      text-align: left;
      padding: 12px;
      font-size: 0.9rem;
      text-transform: uppercase;
      border-bottom: 2px solid #0f172a;
    }

    .fila-vuelo {
      border-bottom: 1px solid #334155;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .fila-vuelo:hover {
      background-color: #334155;
    }

    .fila-vuelo td {
      padding: 14px 12px;
      font-size: 1rem;
      vertical-align: middle;
    }

    .celda-hora {
      display: flex;
      flex-direction: column;
    }

    .hora-local { 
      color: var(--accent-color); 
      font-weight: bold; 
      font-size: 1.05rem;
    }
    
    .hora-zulu { 
      color: var(--text-main); 
      font-size: 0.85rem; 
      margin-top: 2px;
    }

    .vuelo { color: #38bdf8; font-weight: bold; }
    .codigo-aeropuerto { font-weight: bold; color: #f8fafc; }

    .fila-detalle {
      background-color: #0f172a;
      display: none;
    }

    .fila-detalle.abierto {
      display: table-row;
    }

    .contenedor-detalle {
      padding: 15px;
      font-size: 0.9rem;
      line-height: 1.5;
      border-left: 3px solid var(--accent-color);
    }

    .detalle-item {
      margin-bottom: 6px;
    }

    .detalle-item strong {
      color: var(--accent-color);
      text-transform: uppercase;
      font-size: 0.8rem;
    }

    .retraso { color: #ef4444; font-weight: bold; }
    .estado-ok { color: #10b981; font-weight: bold; }
    .accent { color: var(--accent-color); font-weight: bold; }
    
    .loading, .error-msg {
      text-align: center; padding: 40px; background: var(--panel-bg); border-radius: 4px;
    }
    .error-msg { color: #ef4444; }

    @media (max-width: 425px) {
      body { padding: 10px; }
      header { padding: 15px 10px; margin-bottom: 15px; }
      header h1 { font-size: 1.1rem; letter-spacing: 1px; }
      header p { font-size: 0.75rem; }
      .selector-modo { flex-direction: row; }
      .btn-tab { width: 50%; padding: 10px; font-size: 0.85rem; text-align: center; }
      .filtro-contenedor { flex-direction: column; align-items: flex-start; gap: 8px; padding: 12px; }
      .filtro-contenedor label { font-size: 0.8rem; }
      .filtro-contenedor select { width: 100%; box-sizing: border-box; font-size: 0.85rem; padding: 10px; }
      .titulo-dia { font-size: 0.95rem; padding: 8px 10px; }
      .tabla-vuelos th { padding: 10px 8px; font-size: 0.8rem; }
      .fila-vuelo td { padding: 12px 8px; font-size: 0.9rem; }
      .hora-local { font-size: 0.95rem; }
      .hora-zulu { font-size: 0.8rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>FRANKFURT-HAHN (HHN)</h1>
      <p id="status-txt">Conectando con el radar del aeropuerto...</p>
    </header>

    <div class="selector-modo">
      <button id="btn-salidas" class="btn-tab activo" onclick="cambiarModo('departures')">Salidas</button>
      <button id="btn-llegadas" class="btn-tab" onclick="cambiarModo('arrivals')">Llegadas</button>
    </div>

    <div class="filtro-contenedor">
      <label for="filtro-aerolinea">Filtrar por Aerolínea:</label>
      <select id="filtro-aerolinea">
        <option value="TODAS">-- TODAS LAS AEROLÍNEAS --</option>
      </select>
    </div>

    <div id="loading-view" class="loading">Sincronizando panel de vuelos activos...</div>
    
    <div id="contenedor-paneles"></div>
  </div>

  <script>
    let vuelosCargados = [];
    let primeraCarga = true;
    let modoActual = 'departures'; // Puede ser 'departures' o 'arrivals'

    const mapaPaises = {
      'PMI': 'España', 'BCN': 'España', 'ALC': 'España', 'AGP': 'España', 'TFS': 'España',

      'MAD': 'España', 'GRO': 'España', 'REU': 'España',
      'BGY': 'Italia', 'CIA': 'Italia', 'VCE': 'Italia', 'TSF': 'Italia', 'NAP': 'Italia', 
      'PMO': 'Italia', 'BLQ': 'Italia', 'BRI': 'Italia', 'CTA': 'Italia', 'PSA': 'Italia',
      'AHO': 'Italia', 'CAG': 'Italia', 'CRV': 'Italia', 'PSR': 'Italia', 'SUF': 'Italia',
      'STN': 'Reino Unido', 'EDI': 'Reino Unido', 'MAN': 'Reino Unido',
      'BHX': 'Reino Unido', 'DUB': 'Irlanda', 'SNN': 'Irlanda', 'KIR': 'Irlanda',
      'OPO': 'Portugal', 'LIS': 'Portugal', 'FAO': 'Portugal',
      'CHQ': 'Grecia', 'CFU': 'Grecia', 'SKG': 'Grecia', 'ATH': 'Grecia', 'RHO': 'Grecia',
      'OTP': 'Rumanía', 'CLJ': 'Rumanía', 'TSR': 'Rumanía', 'IAS': 'Rumanía', 'SBZ': 'Rumanía',
      'WAW': 'Polonia', 'KRK': 'Polonia', 'WRO': 'Polonia', 'GDN': 'Polonia', 'KTW': 'Polonia',
      'BUD': 'Hungría', 'SOF': 'Bulgaria', 'BOJ': 'Bulgaria', 'VAR': 'Bulgaria',
      'TZL': 'Bosnia y Herz.', 'SJJ': 'Bosnia y Herz.', 'SKP': 'Macedonia', 'KUN': 'Lituania',
      'VNO': 'Lituania', 'RIX': 'Letonia', 'TLL': 'Estonia', 'KIV': 'Moldavia',
      'FEZ': 'Marruecos', 'RAK': 'Marruecos', 'NDR': 'Marruecos', 'TNG': 'Marruecos', 
      'OUD': 'Marruecos', 'AGA': 'Marruecos', 'CMN': 'Marruecos', 'RBA': 'Marruecos', 'DJE': 'Túnez', 'MIR': 'Túnez',
      'FRA': 'Alemania', 'MUC': 'Alemania', 'HHN': 'Alemania', 'SAW': 'Turquía', 'AYT': 'Turquía',
      'RJK': 'Croacia', 'ZAD': 'Croacia', 'TIA': 'Albania', 'DWC': 'Emiratos Árabes Unidos',
      'DMM': 'Arabia Saudita', 'GYD': 'Azerbaiyán', 'ICN': 'Corea del Sur'
    };

    const mapaCiudades = {
      'Thessaloniki': 'Salónica', 'Athens': 'Atenas', 'Bucharest': 'Bucarest', 
      'Warsaw': 'Varsovia', 'Cracow': 'Cracovia', 'Budapest': 'Budapest', 
      'Sofia': 'Sofía', 'Vilnius': 'Vilna', 'Riga': 'Riga', 'Tallinn': 'Tallín',
      'Chisinau': 'Chisinau', 'Fez': 'Fez', 'Marrakech': 'Marrakech', 
      'Tangier': 'Tánger', 'Casablanca': 'Casablanca', 'Rabat': 'Rabat', 
      'Tunis': 'Túnez', 'Munich': 'Múnich', 'Frankfurt': 'Fráncfort', 
      'Istanbul': 'Estambul', 'Antalya': 'Antalia', 'Seoul': 'Seúl',
      'London': 'Londres', 'Milan': 'Milán', 'Rome': 'Roma', 'Venice': 'Venecia',
      'Palma de Mallorca': 'Palma de Mallorca', 'Barcelona': 'Barcelona', 'Alicante': 'Alicante', 'Malaga': 'Málaga', 'Tenerife': 'Tenerife',
      'Lanzarote': 'Lanzarote', 'Ibiza': 'Ibiza', 'Valencia': 'Valencia', 'Seville': 'Sevilla', 'Santiago de Compostela': 'Santiago de Compostela',
      'Madrid': 'Madrid', 'Girona': 'Gerona', 'Reus': 'Reus', 'Treviso': 'Treviso', 'Naples': 'Nápoles',
      'Palermo': 'Palermo', 'Bologna': 'Bolonia', 'Bari': 'Bari', 'Catania': 'Catania', 'Pisa': 'Pisa',
      'Alghero': 'Alguer', 'Cagliari': 'Cagliari', 'Crotone': 'Crotone', 'Pescara': 'Pescara', 'Lamezia Terme': 'Lamezia Terme',
      'Edinburgh': 'Edimburgo', 'Manchester': 'Mánchester', 'Birmingham': 'Birmingham', 'Dublin': 'Dublín', 'Shannon': 'Shannon',
      'Kerry': 'Kerry', 'Porto': 'Oporto', 'Lisbon': 'Lisboa', 'Faro': 'Faro', 'Chania': 'La Canea',
      'Corfu': 'Corfú', 'Rhodes': 'Rodas', 'Cluj-Napoca': 'Cluj-Napoca', 'Timisoara': 'Timișoara', 'Iasi': 'Iași',
      'Sibiu': 'Sibiu', 'Wroclaw': 'Breslavia', 'Gdansk': 'Gdansk', 'Katowice': 'Katowice', 'Burgas': 'Burgas',
      'Varna': 'Varna', 'Tuzla': 'Tuzla', 'Sarajevo': 'Sarajevo', 'Skopje': 'Skopie', 'Kaunas': 'Kaunas',
      'Nador': 'Nador', 'Oujda': 'Oujda', 'Agadir': 'Agadir', 'Djerba': 'Yerba', 'Monastir': 'Monastir',
      'Rijeka': 'Rijeka', 'Zadar': 'Zadar', 'Tirana': 'Tirana', 'Dubai': 'Dubái', 'Dammam': 'Dammam',
      'Baku': 'Bakú'
    };

    // Función modificada para soportar origen o destino dinámicamente
    function obtenerPais(f) {
      const nodoAeropuerto = modoActual === 'departures' ? f.airport.destination : f.airport.origin;
      if (nodoAeropuerto && nodoAeropuerto.country && nodoAeropuerto.country.name) {
        return nodoAeropuerto.country.name;
      }
      const iata = nodoAeropuerto ? nodoAeropuerto.code.iata : '';
      return mapaPaises[iata] || '---';
    }

    // Función modificada para soportar origen o destino dinámicamente
    function obtenerCiudad(f) {
      const nodoAeropuerto = modoActual === 'departures' ? f.airport.destination : f.airport.origin;
      if (nodoAeropuerto && nodoAeropuerto.position && nodoAeropuerto.position.region && nodoAeropuerto.position.region.city) {
        const ciudadIngles = nodoAeropuerto.position.region.city;
        return mapaCiudades[ciudadIngles] || ciudadIngles;
      }
      return '';
    }

    function traducirEstado(estadoIngles) {
      if (!estadoIngles) return '<span class="estado-ok">Programado</span>';
      const texto = estadoIngles.toLowerCase();
      if (texto.includes('departed')) return '<span class="estado-ok">Despegó</span>';
      if (texto.includes('estimated')) return 'Estimado';
      if (texto.includes('delayed')) return '<span class="retraso">Retrasado</span>';
      if (texto.includes('canceled') || texto.includes('cancelled')) return '<span class="retraso">Cancelado</span>';
      if (texto.includes('landed')) return '<span class="estado-ok">Aterrizó</span>';
      if (texto.includes('scheduled')) return '<span class="estado-ok">Programado</span>';
      if (texto.includes('board') || texto.includes('gate')) return '<span class="accent">Embarcando</span>';
      return estadoIngles;
    }

    function actualizarDesplegableAerolineas(vuelos) {
      const select = document.getElementById('filtro-aerolinea');
      let opcionSeleccionada = select.value;
      
      select.innerHTML = '<option value="TODAS">-- TODAS LAS AEROLÍNEAS --</option>';
      const aerolineasUnicas = [...new Set(vuelos.map(item => item.flight.airline ? item.flight.airline.name : 'Desconocida'))].sort();
      
      aerolineasUnicas.forEach(aerolinea => {
        const option = document.createElement('option');
        option.value = aerolinea;
        option.textContent = aerolinea;
        select.appendChild(option);
      });

      if (primeraCarga) {
        const ryanairExiste = aerolineasUnicas.some(a => a.toLowerCase() === 'ryanair');
        if (ryanairExiste) {
          opcionSeleccionada = aerolineasUnicas.find(a => a.toLowerCase() === 'ryanair');
        }
        primeraCarga = false;
      }

      if (aerolineasUnicas.includes(opcionSeleccionada)) {
        select.value = opcionSeleccionada;
      }
    }

    function obtenerNombreDia(fechaStr) {
      const hoy = new Date();
      const mañana = new Date();
      mañana.setDate(hoy.getDate() + 1);
      const fechaVuelo = new Date(fechaStr + "T00:00:00");

      if (fechaVuelo.toDateString() === hoy.toDateString()) {
        return `HOY - ${fechaVuelo.toLocaleDateString('es-ES', { day: 'numeric', month: 'long' })}`;
      } else if (fechaVuelo.toDateString() === mañana.toDateString()) {
        return `MAÑANA - ${fechaVuelo.toLocaleDateString('es-ES', { day: 'numeric', month: 'long' })}`;
      } else {
        return fechaVuelo.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
      }
    }

    function toggleDetalle(idDetalle) {
  const elemento = document.getElementById(idDetalle);
  if (elemento) { // <-- Aquí tenía el error, faltaba la 'o' al final
    elemento.classList.toggle('abierto');
  }
}

    // NUEVA FUNCIÓN: Controla el clic en los botones de cambio
    function cambiarModo(nuevoModo) {
      if (modoActual === nuevoModo) return;
      
      modoActual = nuevoModo;
      
      // Actualizar clases de los botones para el diseño visual
      document.getElementById('btn-salidas').classList.toggle('activo', modoActual === 'departures');
      document.getElementById('btn-llegadas').classList.toggle('activo', modoActual === 'arrivals');
      
      // Mostrar de nuevo el mensaje de carga y refrescar datos
      const loading = document.getElementById('loading-view');
      loading.style.display = 'block';
      loading.innerHTML = "Sincronizando panel de vuelos activos...";
      document.getElementById('contenedor-paneles').innerHTML = '';
      
      cargarPanelFlightradar();
    }

    function renderizarTabla() {
      const contenedor = document.getElementById('contenedor-paneles');
      const filtroSeleccionado = document.getElementById('filtro-aerolinea').value;
      contenedor.innerHTML = '';

      const vuelosFiltrados = vuelosCargados.filter(item => {
        if (filtroSeleccionado === 'TODAS') return true;
        const aerolineaVuelo = item.flight.airline ? item.flight.airline.name : 'Desconocida';
        return aerolineaVuelo === filtroSeleccionado;
      });

      if (vuelosFiltrados.length === 0) {
        contenedor.innerHTML = '<div class="loading">No hay vuelos registrados para los criterios seleccionados.</div>';
        return;
      }

      const vuelosAgrupadosPorDia = {};
      vuelosFiltrados.forEach(item => {
        // En "departures" se lee el tiempo de salida; en "arrivals" el tiempo de llegada
        const tiempoVuelo = modoActual === 'departures' ? item.flight.time.scheduled.departure : item.flight.time.scheduled.arrival;
        const timestamp = tiempoVuelo * 1000;
        const fechaObj = new Date(timestamp);
        const claveFecha = fechaObj.toISOString().split('T')[0]; 
        if (!vuelosAgrupadosPorDia[claveFecha]) {
          vuelosAgrupadosPorDia[claveFecha] = [];
        }
        vuelosAgrupadosPorDia[claveFecha].push(item);
      });

      const diasOrdenados = Object.keys(vuelosAgrupadosPorDia).sort();

      diasOrdenados.forEach(dia => {
        const vuelosDelDia = vuelosAgrupadosPorDia[dia];
        const seccion = document.createElement('div');
        seccion.className = 'seccion-dia';

        const titulo = document.createElement('div');
        titulo.className = 'titulo-dia';
        titulo.textContent = obtenerNombreDia(dia);
        seccion.appendChild(titulo);

        const tabla = document.createElement('table');
        tabla.className = 'tabla-vuelos';
        
        // Cabecera de la tabla cambia dinámicamente su texto secundario (IATA)
        let filasHtml = `
          <thead>
            <tr>
              <th style="width: 33%">Hora</th>
              <th style="width: 33%">${modoActual === 'departures' ? 'Destino' : 'Origen'}</th>
              <th style="width: 33%">Vuelo</th>
            </tr>
          </thead>
          <tbody>
        `;

        vuelosDelDia.forEach((item, indice) => {
          const f = item.flight;
          
          const tiempoVuelo = modoActual === 'departures' ? f.time.scheduled.departure : f.time.scheduled.arrival;
          const timestampMS = tiempoVuelo * 1000;
          const dateObj = new Date(timestampMS);

          const horaLocal = dateObj.toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'});
          const hrsZ = String(dateObj.getUTCHours()).padStart(2, '0');
          const minsZ = String(dateObj.getUTCMinutes()).padStart(2, '0');
          const horaZulu = `${hrsZ}:${minsZ}Z`;

          // Nodo de aeropuerto según el modo
          const nodoAeropuerto = modoActual === 'departures' ? f.airport.destination : f.airport.origin;
          const codigoAeropuerto = nodoAeropuerto ? nodoAeropuerto.code.iata : '---';
          const nombreAeropuerto = nodoAeropuerto ? nodoAeropuerto.name : 'Desconocido';
          const paisConexion = obtenerPais(f);
          const ciudadConexion = obtenerCiudad(f);

          const nombreAerolinea = f.airline ? f.airline.name : 'Desconocida';
          const estadoVuelo = traducirEstado(item.status ? item.status.text : '');

          const modeloAvion = (f.aircraft && f.aircraft.model && f.aircraft.model.text) ? f.aircraft.model.text : 'No asignado';
          const matriculaAvion = (f.aircraft && f.aircraft.registration) ? f.aircraft.registration : 'Desconocida';

          let numeroVueloBase = '';
          if (f.identification) {
            if (f.identification.number && typeof f.identification.number !== 'object') {
              numeroVueloBase = f.identification.number;
            } else if (f.identification.number && f.identification.number.default) {
              numeroVueloBase = f.identification.number.default;
            } else if (f.identification.callsign && typeof f.identification.callsign !== 'object') {
              numeroVueloBase = f.identification.callsign;
            }
          }

          let codigoVuelo = numeroVueloBase || 'Privado';
          const iataAerolinea = (f.airline && f.airline.code) ? f.airline.code.iata : '';

          if (iataAerolinea && numeroVueloBase) {
            let limpio = numeroVueloBase.replace(/\s+/g, '');
            if (!limpio.toUpperCase().startsWith(iataAerolinea.toUpperCase())) {
              codigoVuelo = `${iataAerolinea}${limpio}`;
            } else {
              codigoVuelo = limpio;
            }
          }

          const idDetalle = `detalle-${dia}-${indice}`;

          filasHtml += `
            <tr class="fila-vuelo" onclick="toggleDetalle('${idDetalle}')">
              <td class="celda-hora">
                <span class="hora-local">${horaLocal}</span>
                <span class="hora-zulu">${horaZulu}</span>
              </td>
              <td class="codigo-aeropuerto">${codigoAeropuerto}</td>
              <td class="vuelo">${codigoVuelo.toUpperCase()}</td>
            </tr>
            <tr class="fila-detalle" id="${idDetalle}">
              <td colspan="3">
                <div class="contenedor-detalle">
                  <div class="detalle-item"><strong>Aerolínea:</strong> ${nombreAerolinea}</div>
                  <div class="detalle-item"><strong>Modelo:</strong> ${modeloAvion}</div>
                  <div class="detalle-item"><strong>Matrícula:</strong> ${matriculaAvion}</div>
                            
                  <hr class="separador-detalle">

                  <div class="detalle-item"><strong>${modoActual === 'departures' ? 'Destino' : 'Origen'}:</strong> ${nombreAeropuerto}</div>
                  <div class="detalle-item"><strong>Ciudad:</strong> ${ciudadConexion}</div>
                  <div class="detalle-item"><strong>País:</strong> ${paisConexion}</div>
                  <hr class="separador-detalle">
                  
                  <div class="detalle-item"><strong>Estado:</strong> ${estadoVuelo}</div>
                </div>
              </td>
            </tr>
          `;
        });

        filasHtml += '</tbody>';
        tabla.innerHTML = filasHtml;
        seccion.appendChild(tabla);
        contenedor.appendChild(seccion);
      });
    }

    async function cargarPanelFlightradar() {
      const loading = document.getElementById('loading-view');
      const statusTxt = document.getElementById('status-txt');
      
      // La URL ahora inyecta dinámicamente el valor de `modoActual` (departures o arrivals)
      const URL = `https://api.flightradar24.com/common/v1/airport.json?code=hhn&plugin[]=&plugin-setting[schedule][mode]=${modoActual}&plugin-setting[schedule][timestamp]=` + Math.floor(Date.now() / 1000);

      try {
        const respuesta = await fetch(URL);
        const data = await respuesta.json();
        
        // Asignamos la lista de vuelos dinámicamente según el objeto que devuelva la API
        vuelosCargados = data.result.response.airport.pluginData.schedule[modoActual].data || [];
        loading.style.display = 'none';

        actualizarDesplegableAerolineas(vuelosCargados);
        renderizarTabla();

        const ahora = new Date();
        statusTxt.innerText = `PANEL EN VIVO (${modoActual === 'departures' ? 'SALIDAS' : 'LLEGADAS'}) - ACTUALIZADO: ${ahora.toLocaleTimeString('es-ES')}`;
      } catch (error) {
        console.error(error);
        loading.style.display = 'block';
        loading.innerHTML = `<div class="error-msg">Error al conectar con el radar del aeropuerto. Reconectando automáticamente...</div>`;
      }
    }

    document.getElementById('filtro-aerolinea').addEventListener('change', renderizarTabla);
    cargarPanelFlightradar();
    setInterval(cargarPanelFlightradar, 60000);
  </script>
</body>
</html>
